        // ============================================================
        //  PROTECTION LAYER

        // 1. Disable right-click everywhere
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        }, true);

        // 2. Disable long-press context menu on mobile (touchstart hold)
        document.addEventListener('touchstart', function(e) {
            // track start time
            e._touchStartTime = Date.now();
        }, { passive: true });

        document.addEventListener('touchend', function(e) {
            // nothing needed, just prevent text selection popup
        }, { passive: true });

        // Prevent long-press callout on all elements
        document.addEventListener('touchstart', function(e) {
            e.target.style.webkitTouchCallout = 'none';
        }, { passive: true });

        // Kill long-press context via touchforcechange / contextmenu on touch
        window.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }, true);

        // 3. Block all keyboard dev-tool shortcuts
        document.addEventListener('keydown', function(e) {
            // F12
            if (e.keyCode === 123) { e.preventDefault(); return false; }
            // Ctrl+Shift+I / J / C  (DevTools)
            if (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) { e.preventDefault(); return false; }
            // Ctrl+U  (View Source)
            if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); return false; }
            // Ctrl+S  (Save Page)
            if (e.ctrlKey && e.keyCode === 83) { e.preventDefault(); return false; }
            // Ctrl+A  (Select All)
            if (e.ctrlKey && e.keyCode === 65) { e.preventDefault(); return false; }
            // Ctrl+P  (Print)
            if (e.ctrlKey && e.keyCode === 80) { e.preventDefault(); return false; }
        }, true);

        // 4. Detect DevTools open (desktop) — redirect or blank when opened
        (function devToolsDetect() {
            var threshold = 160;
            function check() {
                if (
                    window.outerWidth - window.innerWidth > threshold ||
                    window.outerHeight - window.innerHeight > threshold
                ) {
                    document.body.innerHTML = '';
                    window.location.replace('about:blank');
                }
            }
            setInterval(check, 1000);
        })();

        // 5. Disable text selection via CSS (JS backup)
        document.onselectstart = function() { return false; };
        document.ondragstart  = function() { return false; };

            const btn = document.querySelector('.btn-download');

            setTimeout(() => btn.style.transform = 'scale(1)', 150);

            if (tg.initDataUnsafe && Object.keys(tg.initDataUnsafe).length > 0) {
                tg.openLink(downloadUrl);
            } else {
                window.location.href = downloadUrl;
            }
        }

        // COUNTDOWN TIMER

            let timeLeft = 5;
            const countdownEl = document.getElementById('countdown');
            const timerBox    = document.getElementById('timerBox');

            const timer = setInterval(() => {
                timeLeft--;
                if (countdownEl) countdownEl.textContent = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    timerBox.innerHTML = '<span class="spinner"></span> Initializing download...';
                    triggerDownload();
                }
            }, 1000);
        });
